name: luacheck
description: Lua static analyser and linter
source: pkg:github/lunarmodules/luacheck
version: "1.2.0"
filetypes:
  - "*.lua"
bin:
  luacheck: luacheck
platforms:
  windows/amd64:
    asset: luacheck.exe
    binary: .
install_fallback:
  method: luarocks
  package: luacheck
  version: "1.2.0"
